<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설문 응답 — SurveyMine</title>
  <meta name="description" content="설문에 응답하는 페이지입니다." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .respond-page {
      min-height: 100vh;
      padding-bottom: var(--sp-20);
    }

    /* 진행률 헤더 */
    .progress-header {
      position: sticky;
      top: 64px;
      z-index: 5;
      background: hsla(228,30%,6%,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--clr-border);
      padding: var(--sp-3) var(--sp-6);
    }

    .progress-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-2);
      font-size: var(--text-sm);
    }

    .progress-label { color: var(--clr-text-secondary); }
    .progress-pct   { font-weight: 700; color: var(--clr-primary-light); }

    /* 설문 헤더 카드 */
    .survey-header-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: var(--sp-8);
      margin-bottom: var(--sp-6);
      position: relative;
      overflow: hidden;
    }

    .survey-header-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--grad-primary);
      opacity: 0.04;
      pointer-events: none;
    }

    .survey-tag {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      background: hsla(248,90%,66%,0.12); border: 1px solid hsla(248,90%,66%,0.25);
      border-radius: var(--radius-full); padding: var(--sp-1) var(--sp-3);
      font-size: var(--text-xs); font-weight: 600; color: var(--clr-primary-light);
      margin-bottom: var(--sp-3);
    }

    .survey-header-title {
      font-size: var(--text-2xl); font-weight: 800; margin-bottom: var(--sp-2);
    }

    .survey-header-desc {
      color: var(--clr-text-secondary); font-size: var(--text-sm); line-height: 1.7;
    }

    .survey-header-meta {
      display: flex; flex-wrap: wrap; gap: var(--sp-4); margin-top: var(--sp-4);
      font-size: var(--text-xs); color: var(--clr-text-muted);
    }

    .survey-meta-item { display: flex; align-items: center; gap: var(--sp-1); }

    /* 문항 영역 */
    .questions-area {
      display: flex;
      flex-direction: column;
      gap: var(--sp-6);
    }

    /* 단일 문항 표시 모드 */
    .question-card { display: none; }
    .question-card.current { display: block; }

    /* 한번에 전체 보기 모드 */
    .show-all .question-card { display: block; }

    /* 내비게이션 */
    .question-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: hsla(228,30%,6%,0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--clr-border);
      padding: var(--sp-4) var(--sp-6);
      z-index: var(--z-overlay);
    }

    .nav-inner {
      max-width: var(--max-w-lg);
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: var(--sp-4);
    }

    .nav-dots {
      flex: 1;
      display: flex;
      justify-content: center;
      gap: var(--sp-2);
      flex-wrap: wrap;
    }

    .nav-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--clr-border);
      transition: all var(--dur-base) var(--ease-out);
      cursor: pointer;
    }

    .nav-dot.done    { background: var(--clr-success); }
    .nav-dot.current {
      background: var(--clr-primary);
      width: 24px; border-radius: 4px;
      box-shadow: 0 0 8px var(--clr-primary-glow);
    }

    /* 완료 화면 */
    .complete-card {
      max-width: 500px; margin: var(--sp-12) auto;
      text-align: center;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-2xl);
      padding: var(--sp-12) var(--sp-10);
      box-shadow: var(--shadow-xl), 0 0 60px hsla(152,80%,52%,0.1);
      animation: scaleIn var(--dur-slow) var(--ease-bounce) both;
    }

    .complete-icon {
      font-size: 5rem;
      display: block;
      margin-bottom: var(--sp-6);
      animation: float 3s ease-in-out infinite;
    }

    .complete-title {
      font-size: var(--text-3xl); font-weight: 900; margin-bottom: var(--sp-3);
      background: var(--grad-accent); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
    }

    .complete-subtitle {
      color: var(--clr-text-secondary); font-size: var(--text-base);
      line-height: 1.7; margin-bottom: var(--sp-8);
    }

    /* 응답 불가 화면 */
    .error-card {
      max-width: 460px; margin: var(--sp-16) auto;
      text-align: center;
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: var(--radius-2xl);
      padding: var(--sp-10);
    }

    @media (max-width: 768px) {
      .progress-header { top: 56px; padding: var(--sp-3) var(--sp-4); }
      .survey-header-card { padding: var(--sp-6); margin-bottom: var(--sp-4); }
      .question-nav  { padding: var(--sp-3) var(--sp-4); }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" aria-label="주 메뉴">
    <a class="navbar-brand" href="index.html" aria-label="SurveyMine 홈">
      <div class="brand-icon" aria-hidden="true">📊</div>
      <span class="text-gradient">SurveyMine</span>
    </a>
    <div class="navbar-nav" id="nav-right">
      <!-- JS로 채워짐 -->
    </div>
  </nav>

  <!-- 진행률 헤더 -->
  <div class="progress-header" id="progress-header" style="display:none" role="status" aria-label="응답 진행률">
    <div class="container container-lg">
      <div class="progress-info">
        <span class="progress-label" id="progress-label">문항 1 / ?</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress progress-xl">
        <div class="progress-bar" id="progress-bar" style="width:0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container" role="alert" aria-live="polite"></div>

  <!-- 메인 콘텐츠 -->
  <main class="respond-page" id="respond-main" role="main">
    <div class="container container-lg" style="padding-top:var(--sp-8)">

      <!-- 로딩 -->
      <div id="loading-state" style="text-align:center;padding:var(--sp-16)" aria-label="로딩 중" aria-live="polite">
        <div class="spinner spinner-lg" style="margin:0 auto var(--sp-4)"></div>
        <p style="color:var(--clr-text-muted)">설문을 불러오는 중...</p>
      </div>

      <!-- 에러 상태 -->
      <div id="error-state" class="error-card" style="display:none" role="alert">
        <div style="font-size:3rem;margin-bottom:var(--sp-4)">😕</div>
        <h2 style="margin-bottom:var(--sp-3)">설문을 찾을 수 없습니다</h2>
        <p id="error-msg" style="color:var(--clr-text-secondary);margin-bottom:var(--sp-6)">
          설문이 종료되었거나 존재하지 않습니다.
        </p>
        <a href="index.html" class="btn btn-primary">← 메인으로 돌아가기</a>
      </div>

      <!-- 설문 응답 -->
      <div id="survey-state" style="display:none">
        <!-- 설문 헤더 -->
        <div class="survey-header-card" id="survey-header">
          <div class="survey-tag" id="survey-school-tag">🏫</div>
          <h1 class="survey-header-title" id="survey-title">설문 제목</h1>
          <p class="survey-header-desc" id="survey-desc"></p>
          <div class="survey-header-meta" id="survey-meta"></div>
        </div>

        <!-- 문항 영역 -->
        <div class="questions-area show-all" id="questions-area" role="form" aria-label="설문 문항"></div>
      </div>

      <!-- 완료 화면 -->
      <div id="complete-state" class="complete-card" style="display:none" role="region" aria-label="응답 완료">
        <span class="complete-icon" aria-hidden="true">🎉</span>
        <h2 class="complete-title">응답 완료!</h2>
        <p class="complete-subtitle">
          소중한 의견을 남겨주셔서 감사합니다.<br/>
          응답이 성공적으로 저장되었습니다.
        </p>
        <div style="display:flex;flex-direction:column;gap:var(--sp-3)">
          <a href="index.html" class="btn btn-primary btn-lg">다른 설문 참여하기</a>
          <button onclick="window.close()" class="btn btn-ghost">창 닫기</button>
        </div>
      </div>

      <div style="font-size:var(--text-xs);color:var(--clr-text-muted);text-align:center;margin:var(--sp-6) 0;opacity:0.8">
        © 창순기획 All rights reserved.
      </div>
    </div><!-- /container -->
  </main>

  <!-- 하단 내비게이션 (설문 응답 중) -->
  <div class="question-nav" id="question-nav" style="display:none" role="navigation" aria-label="문항 내비게이션">
    <div class="nav-inner">
      <button class="btn btn-ghost btn-sm" id="btn-submit" aria-label="제출">
        <span id="submit-text">📤 제출하기</span>
        <div class="spinner spinner-sm" id="submit-spinner" style="display:none"></div>
      </button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/question-types/index.js"></script>
  <script>
    /* ── Toast ──────────────────────────────────────────────────── */
    function showToast(type, title, msg='', dur=4000) {
      const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.innerHTML = `<div class="toast-icon">${icons[type]}</div><div class="toast-body"><div class="toast-title">${title}</div>${msg?`<div class="toast-message">${msg}</div>`:''}</div>`;
      c.appendChild(t);
      setTimeout(() => t.remove(), dur);
    }

    /* ── 상태 ────────────────────────────────────────────────────── */
    let survey = null;
    let questions = [];
    const params = new URLSearchParams(location.search);
    const surveyId = params.get('surveyId');

    /* ── 초기화 ──────────────────────────────────────────────────── */
    (async function init() {
      if (!surveyId) { showError('설문 ID가 없습니다.'); return; }

      // 중복 응답 체크
      if (Auth.hasResponded(surveyId)) {
        showError('이미 이 설문에 응답하셨습니다.');
        return;
      }

      try {
        const res = await API.getSurvey(surveyId);
        survey    = res.survey;
        questions = res.questions || [];
        renderSurvey();
      } catch (err) {
        // 데모 모드
        survey = {
          surveyId: 'SRV-DEMO-001',
          schoolName: '경남중학교',
          title: '2026년 1학기 학교생활 만족도 조사',
          description: '본 설문은 학교 환경 개선을 위한 학생 의견을 수집하기 위해 진행됩니다. 솔직한 의견을 부탁드립니다.',
          endAt: '2026-07-31',
          status: 'open',
        };
        questions = [
          {
            questionId: 'Q001', order: 1, type: 'radio', required: true,
            title: '현재 학년을 선택해 주세요.',
            options: ['1학년', '2학년', '3학년'],
          },
          {
            questionId: 'Q002', order: 2, type: 'grid_radio', required: true,
            title: '다음 항목에 대해 만족도를 평가해 주세요.',
            grid: { rows: ['수업 내용', '급식 품질', '학교 시설', '동아리 활동'], cols: ['매우불만', '불만', '보통', '만족', '매우만족'], colScores: [1,2,3,4,5] },
          },
          {
            questionId: 'Q003', order: 3, type: 'scale', required: true,
            title: '전반적인 학교생활 만족도를 점수로 표현해 주세요.',
            validation: { min: 1, max: 10, minLabel: '매우 불만족', maxLabel: '매우 만족' },
          },
          {
            questionId: 'Q004', order: 4, type: 'rating', required: false,
            title: '담임 선생님의 수업 열정을 평가해 주세요.',
            validation: { max: 5 },
          },
          {
            questionId: 'Q005', order: 5, type: 'checkbox', required: false,
            title: '학교에서 개선이 필요하다고 생각하는 항목을 모두 선택해 주세요.',
            options: ['화장실 환경', '급식 메뉴 다양화', '냉난방 시설', '교실 비품', '운동장/체육시설', '도서관 확충'],
          },
          {
            questionId: 'Q006', order: 6, type: 'rank', required: false,
            title: '다음 방과후 프로그램의 선호 순위를 매겨 주세요.',
            options: ['영어 회화', '코딩/AI', '음악/미술', '스포츠', '진로 상담'],
          },
          {
            questionId: 'Q007', order: 7, type: 'textarea', required: false,
            title: '학교생활에서 좋았던 점이나 개선하고 싶은 점을 자유롭게 작성해 주세요.',
            validation: { placeholder: '예) 도서관 이용 시간이 더 길었으면 합니다...', maxLength: 500 },
          },
          {
            questionId: 'Q008', order: 8, type: 'signature', required: false,
            title: '응답자 서명 (선택)',
          },
        ];
        showToast('info', '데모 모드', 'GAS 연결 전 데모 데이터로 표시됩니다.');
        renderSurvey();
      }
    })();

    /* ── 설문 렌더링 ──────────────────────────────────────────────── */
    function renderSurvey() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('survey-state').style.display  = 'block';
      document.getElementById('progress-header').style.display = 'block';
      document.getElementById('question-nav').style.display   = 'flex';

      // 헤더
      document.getElementById('survey-school-tag').textContent = `🏫 ${survey.schoolName}`;
      document.getElementById('survey-title').textContent = survey.title;
      document.getElementById('survey-desc').textContent  = survey.description || '';

      const meta = document.getElementById('survey-meta');
      meta.innerHTML = `
        <span class="survey-meta-item">📝 ${questions.length}개 문항</span>
        ${survey.endAt ? `<span class="survey-meta-item">📅 마감: ${survey.endAt}</span>` : ''}
        <span class="survey-meta-item">⏱️ 약 ${Math.ceil(questions.length * 0.7)}분 소요</span>
      `;

      // 문항 렌더링
      const area = document.getElementById('questions-area');
      area.innerHTML = questions
        .sort((a, b) => (a.order || 0) - (b.order || 0))
        .map((q, i) => QuestionRenderer.render(q, i))
        .join('');

      QuestionRenderer.bindEvents(area);
      QuestionRenderer.initRankDefaults(area);

      // 전체 표시 모드로 진행률 업데이트
      updateProgress();
    }

    function updateProgress() {
      const total   = questions.length;
      const answered = questions.filter(q => {
        const hidden = document.getElementById(`q_${q.questionId}`);
        if (hidden && hidden.value) return true;
        if (document.querySelector(`[name="q_${q.questionId}"]:checked`)) return true;
        return false;
      }).length;

      const pct = total ? Math.round((answered / total) * 100) : 0;

      document.getElementById('progress-label').textContent = `${answered} / ${total} 문항 응답`;
      document.getElementById('progress-pct').textContent   = `${pct}%`;
      document.getElementById('progress-bar').style.width   = `${pct}%`;
      document.getElementById('progress-bar').setAttribute('aria-valuenow', pct);
    }

    // 응답 변경 시 진행률 갱신
    document.addEventListener('change', updateProgress);
    document.addEventListener('input',  updateProgress);
    document.addEventListener('click',  e => {
      if (e.target.closest('.scale-btn, .star-btn, .rank-item, .option-card')) {
        setTimeout(updateProgress, 50);
      }
    });

    /* ── 에러 표시 ────────────────────────────────────────────────── */
    function showError(msg) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').style.display   = 'flex';
      document.getElementById('error-msg').textContent = msg;
    }

    /* ── 제출 ─────────────────────────────────────────────────────── */
    document.getElementById('btn-submit').addEventListener('click', async () => {
      // 전체 유효성 검사
      let firstInvalid = null;
      let allValid = true;
      for (const q of questions) {
        if (!QuestionRenderer.validate(q)) {
          allValid = false;
          if (!firstInvalid) firstInvalid = q.questionId;
        }
      }

      if (!allValid) {
        showToast('warning', '미완성 문항이 있습니다', '필수 항목을 모두 채워 주세요.');
        if (firstInvalid) {
          const el = document.querySelector(`[data-question-id="${firstInvalid}"]`);
          el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        return;
      }

      // 답변 수집
      const answers = [];
      for (const q of questions) {
        answers.push(...QuestionRenderer.collect(q));
      }

      // 로딩
      const btn = document.getElementById('btn-submit');
      document.getElementById('submit-text').style.display  = 'none';
      document.getElementById('submit-spinner').style.display = 'block';
      btn.disabled = true;

      const startTime = parseInt(sessionStorage.getItem('survey_start') || Date.now().toString(), 10);
      const durationSec = Math.round((Date.now() - startTime) / 1000);
      const deviceType  = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';

      try {
        await API.submitResponse(surveyId, answers, { durationSec, deviceType });
        Auth.markResponded(surveyId);
        showComplete();
      } catch (err) {
        // 데모: 바로 완료
        showToast('info', '데모 모드', '실제 저장 없이 완료 화면을 표시합니다.');
        Auth.markResponded(surveyId);
        showComplete();
      }
    });

    /* ── 완료 화면 ────────────────────────────────────────────────── */
    function showComplete() {
      document.getElementById('survey-state').style.display   = 'none';
      document.getElementById('progress-header').style.display = 'none';
      document.getElementById('question-nav').style.display   = 'none';
      document.getElementById('complete-state').style.display = 'block';
    }

    /* ── 시작 시간 기록 ───────────────────────────────────────────── */
    sessionStorage.setItem('survey_start', Date.now().toString());
  </script>
</body>
</html>
