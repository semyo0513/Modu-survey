<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설문 빌더 — SurveyMine</title>
  <meta name="description" content="설문 문항을 만들고 편집합니다." />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { overflow: hidden; }

    .builder-page {
      display: grid;
      grid-template-rows: 64px 56px 1fr;
      height: 100vh;
    }

    /* 빌더 상단 툴바 */
    .builder-toolbar {
      background: var(--clr-bg-surface);
      border-bottom: 1px solid var(--clr-border);
      padding: 0 var(--sp-6);
      display: flex; align-items: center; gap: var(--sp-4);
    }

    .builder-survey-title-input {
      flex: 1; max-width: 400px;
      background: var(--clr-bg-elevated);
      border: 1.5px solid var(--clr-border);
      border-radius: var(--radius-md);
      padding: var(--sp-2) var(--sp-4);
      color: var(--clr-text-primary);
      font-size: var(--text-base); font-weight: 600;
      outline: none; transition: all var(--dur-fast);
    }

    .builder-survey-title-input:focus {
      border-color: var(--clr-primary);
      box-shadow: 0 0 0 3px var(--clr-primary-glow);
    }

    .toolbar-sep {
      width: 1px; height: 24px; background: var(--clr-border); flex-shrink: 0;
    }

    /* 3단 레이아웃 */
    .builder-layout {
      display: grid;
      grid-template-columns: 260px 1fr 320px;
      overflow: hidden;
    }

    /* 좌측: 문항 타입 팔레트 */
    .panel-left {
      background: var(--clr-bg-surface);
      border-right: 1px solid var(--clr-border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: var(--sp-4) var(--sp-5);
      border-bottom: 1px solid var(--clr-border);
      font-size: var(--text-xs); font-weight: 700;
      color: var(--clr-text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    .panel-body { flex: 1; overflow-y: auto; padding: var(--sp-4); }

    .type-section-label {
      font-size: var(--text-xs); font-weight: 700; color: var(--clr-text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin: var(--sp-3) 0 var(--sp-2);
    }

    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-2); margin-bottom: var(--sp-3); }

    .type-tile {
      display: flex; flex-direction: column; align-items: center;
      gap: var(--sp-1); padding: var(--sp-3) var(--sp-2);
      background: var(--clr-bg-elevated);
      border: 1.5px solid var(--clr-border);
      border-radius: var(--radius-md);
      cursor: pointer; transition: all var(--dur-fast) var(--ease-out);
      font-size: 0.68rem; font-weight: 600;
      color: var(--clr-text-secondary); text-align: center;
      user-select: none;
    }

    .type-tile:hover {
      border-color: var(--clr-primary);
      color: var(--clr-primary-light);
      background: hsla(248,90%,66%,0.08);
      transform: translateY(-2px);
    }

    .type-tile .t-icon { font-size: 1.3rem; }

    /* 중앙: 문항 목록 */
    .panel-center {
      background: var(--clr-bg-base);
      overflow-y: auto;
      padding: var(--sp-5);
      display: flex; flex-direction: column; gap: var(--sp-3);
    }

    .builder-q-item {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1.5px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--sp-4) var(--sp-5);
      cursor: pointer;
      transition: all var(--dur-fast);
      display: flex; align-items: flex-start; gap: var(--sp-3);
      position: relative;
    }

    .builder-q-item:hover { border-color: var(--clr-border-focus); }
    .builder-q-item.selected {
      border-color: var(--clr-primary);
      background: hsla(248,90%,66%,0.07);
      box-shadow: 0 0 0 1px var(--clr-primary);
    }

    .builder-q-item.dragging {
      opacity: 0.5; border-style: dashed;
    }

    .q-drag-handle {
      color: var(--clr-text-muted); cursor: grab; font-size: 1rem;
      padding-top: 2px; flex-shrink: 0;
    }

    .q-item-body { flex: 1; min-width: 0; }

    .q-type-chip {
      display: inline-flex; align-items: center; gap: var(--sp-1);
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--clr-primary-light);
      background: hsla(248,90%,66%,0.12);
      border-radius: var(--radius-full); padding: 2px var(--sp-2);
      margin-bottom: var(--sp-2);
    }

    .q-item-title {
      font-size: var(--text-sm); font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--clr-text-primary);
    }

    .q-item-meta {
      font-size: var(--text-xs); color: var(--clr-text-muted); margin-top: 2px;
    }

    .q-item-actions {
      display: flex; gap: var(--sp-1); flex-shrink: 0; opacity: 0;
      transition: opacity var(--dur-fast);
    }

    .builder-q-item:hover .q-item-actions,
    .builder-q-item.selected .q-item-actions { opacity: 1; }

    .q-num {
      position: absolute; top: var(--sp-3); right: var(--sp-3);
      width: 22px; height: 22px;
      background: var(--clr-bg-elevated);
      border-radius: 50%;
      font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: var(--clr-text-muted);
    }

    .center-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: var(--sp-4);
      color: var(--clr-text-muted); text-align: center;
      padding: var(--sp-12);
    }

    .center-empty-icon { font-size: 3rem; }

    /* 우측: 문항 편집 패널 */
    .panel-right {
      background: var(--clr-bg-surface);
      border-left: 1px solid var(--clr-border);
      overflow-y: auto;
    }

    .editor-section { padding: var(--sp-5); border-bottom: 1px solid var(--clr-border); }
    .editor-section:last-child { border-bottom: none; }
    .editor-label {
      font-size: var(--text-xs); font-weight: 700; color: var(--clr-text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--sp-3);
    }

    .options-list { display: flex; flex-direction: column; gap: var(--sp-2); }

    .option-row {
      display: flex; align-items: center; gap: var(--sp-2);
    }

    .option-row input {
      flex: 1; padding: var(--sp-2) var(--sp-3);
      background: var(--clr-bg-elevated); border: 1.5px solid var(--clr-border);
      border-radius: var(--radius-sm); color: var(--clr-text-primary);
      font-size: var(--text-sm); outline: none; font-family: var(--font-sans);
      transition: border-color var(--dur-fast);
    }

    .option-row input:focus { border-color: var(--clr-primary); }

    .option-del-btn {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      background: none; border: none; cursor: pointer;
      color: var(--clr-text-muted); font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--dur-fast); flex-shrink: 0;
    }

    .option-del-btn:hover { background: hsla(355,85%,65%,0.15); color: var(--clr-danger); }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-2) 0;
    }

    .toggle-label { font-size: var(--text-sm); color: var(--clr-text-secondary); }

    .toggle-switch {
      width: 40px; height: 22px; background: var(--clr-bg-elevated);
      border-radius: var(--radius-full); position: relative;
      cursor: pointer; transition: background var(--dur-fast);
      border: 1.5px solid var(--clr-border); flex-shrink: 0;
    }

    .toggle-switch.on { background: var(--clr-primary); border-color: var(--clr-primary); }

    .toggle-switch::after {
      content: ''; position: absolute;
      width: 16px; height: 16px; border-radius: 50%;
      background: white; top: 1px; left: 1px;
      transition: transform var(--dur-fast) var(--ease-out);
      box-shadow: 0 1px 3px hsla(0,0%,0%,0.3);
    }

    .toggle-switch.on::after { transform: translateX(18px); }

    /* 미리보기 없음 placeholder */
    .no-selection {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: var(--sp-4); color: var(--clr-text-muted); text-align: center;
      padding: var(--sp-8);
    }

    @media (max-width: 1024px) {
      body { overflow: auto; }
      .builder-page { grid-template-rows: auto auto auto; height: auto; }
      .builder-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
      .panel-left, .panel-right { max-height: 260px; }
      .panel-center { min-height: 400px; overflow: visible; }
    }
  </style>
</head>
<body>
<div class="builder-page">

  <!-- Navbar -->
  <nav class="navbar" style="position:relative;z-index:auto" aria-label="주 메뉴">
    <a class="navbar-brand" href="../index.html" aria-label="SurveyMine 홈">
      <div class="brand-icon" aria-hidden="true">📊</div>
      <span class="text-gradient">SurveyMine</span>
    </a>
    <div class="navbar-nav">
      <a class="btn btn-ghost btn-sm" href="dashboard.html">← 목록</a>
      <div class="toolbar-sep"></div>
      <span id="save-status" style="font-size:var(--text-xs);color:var(--clr-text-muted)">저장됨</span>
      <button class="btn btn-outline btn-sm" id="btn-preview" aria-label="미리보기">👁 미리보기</button>
      <button class="btn btn-primary btn-sm" id="btn-publish" aria-label="게시">🚀 게시</button>
    </div>
  </nav>

  <!-- 빌더 툴바 -->
  <div class="builder-toolbar" role="toolbar" aria-label="설문 설정">
    <input type="text" class="builder-survey-title-input" id="survey-title-input"
           placeholder="설문 제목 입력..." aria-label="설문 제목" />
    <div class="toolbar-sep"></div>
    <div style="display:flex;align-items:center;gap:var(--sp-2);font-size:var(--text-sm);color:var(--clr-text-secondary)">
      <span>📝</span>
      <span id="q-count-label">0개 문항</span>
    </div>
    <div class="toolbar-sep"></div>
    <label style="display:flex;align-items:center;gap:var(--sp-2);font-size:var(--text-sm);cursor:pointer">
      <span style="color:var(--clr-text-muted)">복수응답</span>
      <div class="toggle-switch" id="toggle-multiple" role="switch" aria-checked="true" tabindex="0"></div>
    </label>
  </div>

  <!-- 3단 레이아웃 -->
  <div class="builder-layout">

    <!-- 좌측: 타입 팔레트 -->
    <aside class="panel-left" aria-label="문항 타입 선택">
      <div class="panel-header">문항 타입</div>
      <div class="panel-body">
        <div class="type-section-label">선택형</div>
        <div class="type-grid" id="type-palette">
          <!-- JS로 채워짐 -->
        </div>
      </div>
      <div style="font-size:10px;color:var(--clr-text-muted);text-align:center;padding:var(--sp-3);border-top:1px solid var(--clr-border);opacity:0.8">
        © 창순기획
      </div>
    </aside>

    <!-- 중앙: 문항 목록 -->
    <main class="panel-center" id="questions-list" role="list" aria-label="문항 목록">
      <div class="center-empty" id="center-empty">
        <div class="center-empty-icon" aria-hidden="true">🧩</div>
        <strong>좌측에서 문항 타입을 클릭하세요</strong>
        <span style="font-size:var(--text-sm)">원하는 문항을 추가하여 설문을 구성하세요</span>
      </div>
    </main>

    <!-- 우측: 편집 패널 -->
    <aside class="panel-right" aria-label="문항 편집">
      <div class="no-selection" id="no-selection">
        <span style="font-size:2.5rem" aria-hidden="true">👈</span>
        <strong>문항을 선택하세요</strong>
        <span style="font-size:var(--text-sm)">선택하면 여기서 편집할 수 있습니다</span>
      </div>
      <div id="editor-panel" style="display:none">
        <!-- JS로 동적 생성 -->
      </div>
    </aside>

  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toast-container" role="alert" aria-live="polite"></div>

<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script src="../js/question-types/index.js"></script>
<script>
if (!Auth.requireAuth(true)) { /* redirects */ }

function showToast(type, title, msg='') {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<div class="toast-icon">${icons[type]}</div><div class="toast-body"><div class="toast-title">${title}</div>${msg?`<div class="toast-message">${msg}</div>`:''}</div>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

/* ── 상수 ─────────────────────────────────────────────────────────── */
const TYPE_DEFS = [
  { type:'radio',         icon:'🔘', label:'단일 선택',     hasOptions:true },
  { type:'checkbox',      icon:'☑️',  label:'복수 선택',     hasOptions:true },
  { type:'dropdown',      icon:'🔽', label:'드롭다운',       hasOptions:true },
  { type:'text',          icon:'📝', label:'단답형' },
  { type:'textarea',      icon:'📄', label:'서술형(장문)' },
  { type:'grid_radio',    icon:'📊', label:'객관식 그리드',  hasGrid:true },
  { type:'grid_checkbox', icon:'🔲', label:'체크박스 그리드', hasGrid:true },
  { type:'scale',         icon:'📏', label:'선형 척도' },
  { type:'rating',        icon:'⭐', label:'별점 평가' },
  { type:'rank',          icon:'🔢', label:'순위 매기기',    hasOptions:true },
  { type:'signature',     icon:'✍️',  label:'터치패드 서명' },
  { type:'date',          icon:'📅', label:'날짜/시간' },
];

const params   = new URLSearchParams(location.search);
const surveyId = params.get('surveyId') || 'NEW';

let questions   = [];
let selectedIdx = -1;
let saveTimer   = null;

/* ── 팔레트 렌더 ──────────────────────────────────────────────────── */
function buildPalette() {
  const grid = document.getElementById('type-palette');
  grid.innerHTML = TYPE_DEFS.map(def => `
    <div class="type-tile" data-type="${def.type}" role="button"
         tabindex="0" aria-label="${def.label} 추가">
      <span class="t-icon">${def.icon}</span>
      <span>${def.label}</span>
    </div>`).join('');

  grid.querySelectorAll('.type-tile').forEach(tile => {
    const add = () => addQuestion(tile.dataset.type);
    tile.addEventListener('click', add);
    tile.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') add(); });
  });
}

/* ── 문항 추가 ────────────────────────────────────────────────────── */
function makeDefaultQuestion(type) {
  const def   = TYPE_DEFS.find(d => d.type === type);
  const qid   = 'Q_' + Date.now();
  const base  = {
    questionId: qid,
    type,
    title: `${def.label} 문항`,
    required: false,
    order: questions.length + 1,
  };
  if (def.hasOptions) base.options = ['선택지 1', '선택지 2', '선택지 3'];
  if (def.hasGrid)    base.grid    = { rows:['항목 1','항목 2'], cols:['매우불만','불만','보통','만족','매우만족'] };
  if (type === 'scale')   base.validation = { min:1, max:5, minLabel:'최저', maxLabel:'최고' };
  if (type === 'rating')  base.validation = { max:5 };
  return base;
}

function addQuestion(type) {
  const q = makeDefaultQuestion(type);
  questions.push(q);
  renderList();
  selectQuestion(questions.length - 1);
  scheduleSave();
  document.getElementById('center-empty').style.display = 'none';
}

/* ── 문항 삭제 ────────────────────────────────────────────────────── */
function deleteQuestion(idx) {
  questions.splice(idx, 1);
  questions.forEach((q, i) => q.order = i + 1);
  if (selectedIdx >= questions.length) selectedIdx = questions.length - 1;
  renderList();
  if (selectedIdx >= 0) selectQuestion(selectedIdx);
  else { document.getElementById('no-selection').style.display=''; document.getElementById('editor-panel').style.display='none'; }
  if (questions.length === 0) document.getElementById('center-empty').style.display='';
  scheduleSave();
}

/* ── 복제 ─────────────────────────────────────────────────────────── */
function duplicateQuestion(idx) {
  const copy = JSON.parse(JSON.stringify(questions[idx]));
  copy.questionId = 'Q_' + Date.now();
  copy.order = idx + 2;
  questions.splice(idx + 1, 0, copy);
  questions.forEach((q, i) => q.order = i + 1);
  renderList();
  selectQuestion(idx + 1);
  scheduleSave();
}

/* ── 목록 렌더 ────────────────────────────────────────────────────── */
function renderList() {
  const list = document.getElementById('questions-list');
  const empEl = document.getElementById('center-empty');
  empEl.style.display = questions.length ? 'none' : '';

  // 기존 문항 아이템만 제거
  list.querySelectorAll('.builder-q-item').forEach(el => el.remove());

  questions.forEach((q, i) => {
    const def  = TYPE_DEFS.find(d => d.type === q.type) || {};
    const item = document.createElement('div');
    item.className = `builder-q-item${i === selectedIdx ? ' selected' : ''}`;
    item.draggable = true;
    item.dataset.idx = i;
    item.setAttribute('role', 'listitem');
    item.innerHTML = `
      <div class="q-drag-handle" aria-hidden="true">⠿</div>
      <div class="q-item-body">
        <div class="q-type-chip">${def.icon || ''} ${def.label || q.type}</div>
        <div class="q-item-title">${q.title}</div>
        <div class="q-item-meta">${q.required ? '✱ 필수' : '선택'}</div>
      </div>
      <div class="q-item-actions">
        <button class="btn-icon-sm btn btn-ghost" data-action="dup" aria-label="복제" title="복제">⧉</button>
        <button class="btn-icon-sm btn btn-ghost" data-action="del" aria-label="삭제" title="삭제" style="color:var(--clr-danger)">✕</button>
      </div>
      <div class="q-num">${i + 1}</div>`;

    item.addEventListener('click', e => {
      if (e.target.closest('[data-action]')) return;
      selectQuestion(i);
    });

    item.querySelector('[data-action="dup"]').addEventListener('click', e => { e.stopPropagation(); duplicateQuestion(i); });
    item.querySelector('[data-action="del"]').addEventListener('click', e => { e.stopPropagation(); if (confirm('삭제할까요?')) deleteQuestion(i); });

    // 드래그 정렬
    item.addEventListener('dragstart', e => { e.dataTransfer.effectAllowed='move'; item.classList.add('dragging'); item._dragIdx=i; });
    item.addEventListener('dragend',   () => item.classList.remove('dragging'));
    item.addEventListener('dragover',  e => {
      e.preventDefault();
      const src = list.querySelector('.dragging');
      if (!src || src===item) return;
      const rect = item.getBoundingClientRect();
      const before = e.clientY < rect.top + rect.height/2;
      list.insertBefore(src, before ? item : item.nextSibling);
    });
    item.addEventListener('drop', () => {
      // 순서 재계산
      const newOrder = [...list.querySelectorAll('.builder-q-item')].map(el => parseInt(el.dataset.idx));
      const reordered = newOrder.map(oi => questions[oi]);
      reordered.forEach((q, i) => q.order = i+1);
      questions.length = 0;
      questions.push(...reordered);
      renderList();
      scheduleSave();
    });

    list.appendChild(item);
  });

  document.getElementById('q-count-label').textContent = `${questions.length}개 문항`;
}

/* ── 문항 선택 & 편집 패널 ────────────────────────────────────────── */
function selectQuestion(idx) {
  selectedIdx = idx;
  renderList();
  const q = questions[idx];
  if (!q) return;

  document.getElementById('no-selection').style.display   = 'none';
  document.getElementById('editor-panel').style.display   = 'block';
  renderEditor(q, idx);
}

function renderEditor(q, idx) {
  const def = TYPE_DEFS.find(d => d.type === q.type) || {};
  const panel = document.getElementById('editor-panel');

  panel.innerHTML = `
    <!-- 제목 -->
    <div class="editor-section">
      <div class="editor-label">문항 제목</div>
      <textarea class="form-textarea" id="ed-title" rows="2"
                aria-label="문항 제목">${q.title}</textarea>
    </div>

    <!-- 필수 여부 -->
    <div class="editor-section">
      <div class="toggle-row">
        <span class="toggle-label">필수 항목</span>
        <div class="toggle-switch${q.required?' on':''}" id="ed-required"
             role="switch" aria-checked="${q.required}" tabindex="0"></div>
      </div>
    </div>

    <!-- 선택지 (radio, checkbox, dropdown, rank) -->
    ${def.hasOptions ? `
    <div class="editor-section">
      <div class="editor-label">선택지</div>
      <div class="options-list" id="ed-options">
        ${(q.options||[]).map((opt,i) => optionRowHtml(opt, i)).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="ed-add-option" style="margin-top:var(--sp-3)">
        + 선택지 추가
      </button>
    </div>` : ''}

    <!-- 그리드 행/열 -->
    ${def.hasGrid ? `
    <div class="editor-section">
      <div class="editor-label">행 (항목)</div>
      <div class="options-list" id="ed-rows">
        ${(q.grid?.rows||[]).map((r,i) => optionRowHtml(r, i, 'row')).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="ed-add-row" style="margin-top:var(--sp-2)">+ 행 추가</button>
      <div class="editor-label" style="margin-top:var(--sp-4)">열 (척도/선택지)</div>
      <div class="options-list" id="ed-cols">
        ${(q.grid?.cols||[]).map((c,i) => optionRowHtml(c, i, 'col')).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="ed-add-col" style="margin-top:var(--sp-2)">+ 열 추가</button>
    </div>` : ''}

    <!-- 척도 설정 -->
    ${q.type==='scale' ? `
    <div class="editor-section">
      <div class="editor-label">척도 범위</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3)">
        <div class="form-group">
          <label class="form-label" for="ed-scale-min">최솟값</label>
          <input id="ed-scale-min" type="number" class="form-input" value="${q.validation?.min||1}" min="1" max="10" />
        </div>
        <div class="form-group">
          <label class="form-label" for="ed-scale-max">최댓값</label>
          <input id="ed-scale-max" type="number" class="form-input" value="${q.validation?.max||5}" min="2" max="10" />
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);margin-top:var(--sp-3)">
        <div class="form-group">
          <label class="form-label" for="ed-scale-min-label">최솟값 레이블</label>
          <input id="ed-scale-min-label" type="text" class="form-input" value="${q.validation?.minLabel||''}" placeholder="예: 매우 불만족" />
        </div>
        <div class="form-group">
          <label class="form-label" for="ed-scale-max-label">최댓값 레이블</label>
          <input id="ed-scale-max-label" type="text" class="form-input" value="${q.validation?.maxLabel||''}" placeholder="예: 매우 만족" />
        </div>
      </div>
    </div>` : ''}

    <!-- 별점 설정 -->
    ${q.type==='rating' ? `
    <div class="editor-section">
      <div class="editor-label">별점 최대값</div>
      <select class="form-select" id="ed-rating-max">
        ${[3,4,5,6,7,10].map(n=>`<option value="${n}"${(q.validation?.max||5)===n?' selected':''}>${n}점</option>`).join('')}
      </select>
      <div class="toggle-row" style="margin-top:var(--sp-3)">
        <span class="toggle-label">이모지 모드 😍</span>
        <div class="toggle-switch${q.validation?.emoji?' on':''}" id="ed-emoji-mode"
             role="switch" aria-checked="${!!q.validation?.emoji}" tabindex="0"></div>
      </div>
    </div>` : ''}

    <!-- 텍스트 설정 -->
    ${(q.type==='text'||q.type==='textarea') ? `
    <div class="editor-section">
      <div class="editor-label">텍스트 설정</div>
      <div class="form-group">
        <label class="form-label" for="ed-placeholder">안내 문구(placeholder)</label>
        <input id="ed-placeholder" type="text" class="form-input" value="${q.validation?.placeholder||''}" placeholder="입력 안내 문구..." />
      </div>
      <div class="form-group" style="margin-top:var(--sp-3)">
        <label class="form-label" for="ed-maxlen">최대 글자 수</label>
        <input id="ed-maxlen" type="number" class="form-input" value="${q.validation?.maxLength||''}" placeholder="제한 없음" min="1" />
      </div>
    </div>` : ''}

    <!-- 날짜 설정 -->
    ${q.type==='date' ? `
    <div class="editor-section">
      <div class="toggle-row">
        <span class="toggle-label">시간 포함</span>
        <div class="toggle-switch${q.validation?.includeTime?' on':''}" id="ed-include-time"
             role="switch" aria-checked="${!!q.validation?.includeTime}" tabindex="0"></div>
      </div>
    </div>` : ''}

    <!-- 저장 버튼 -->
    <div class="editor-section">
      <button class="btn btn-primary btn-full" id="ed-save">💾 저장</button>
    </div>
  `;

  bindEditorEvents(q, idx, def);
}

function optionRowHtml(val, i, kind='option') {
  return `
    <div class="option-row" data-kind="${kind}" data-i="${i}">
      <input type="text" value="${val}" aria-label="선택지 ${i+1}" />
      <button class="option-del-btn" aria-label="삭제">✕</button>
    </div>`;
}

function bindEditorEvents(q, idx, def) {
  // 필수 토글
  const reqToggle = document.getElementById('ed-required');
  if (reqToggle) {
    const toggleClick = () => {
      q.required = !q.required;
      reqToggle.classList.toggle('on', q.required);
      reqToggle.setAttribute('aria-checked', q.required);
    };
    reqToggle.addEventListener('click', toggleClick);
    reqToggle.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') toggleClick(); });
  }

  // 선택지 삭제
  document.querySelectorAll('#ed-options .option-del-btn').forEach((btn, i) => {
    btn.addEventListener('click', () => { q.options.splice(i, 1); renderEditor(q, idx); scheduleSave(); });
  });

  // 선택지 추가
  document.getElementById('ed-add-option')?.addEventListener('click', () => {
    q.options = q.options || [];
    q.options.push(`선택지 ${q.options.length + 1}`);
    renderEditor(q, idx);
    scheduleSave();
  });

  // 그리드 행/열
  document.getElementById('ed-add-row')?.addEventListener('click', () => {
    q.grid.rows.push(`항목 ${q.grid.rows.length + 1}`); renderEditor(q, idx); scheduleSave();
  });
  document.getElementById('ed-add-col')?.addEventListener('click', () => {
    q.grid.cols.push(`선택지 ${q.grid.cols.length + 1}`); renderEditor(q, idx); scheduleSave();
  });
  document.querySelectorAll('#ed-rows .option-del-btn').forEach((btn, i) => {
    btn.addEventListener('click', () => { q.grid.rows.splice(i, 1); renderEditor(q, idx); scheduleSave(); });
  });
  document.querySelectorAll('#ed-cols .option-del-btn').forEach((btn, i) => {
    btn.addEventListener('click', () => { q.grid.cols.splice(i, 1); renderEditor(q, idx); scheduleSave(); });
  });

  // 척도 설정
  const bindInput = (id, setter) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => { setter(el.value); scheduleSave(); });
  };
  bindInput('ed-scale-min',       v => { q.validation = q.validation||{}; q.validation.min=parseInt(v); });
  bindInput('ed-scale-max',       v => { q.validation = q.validation||{}; q.validation.max=parseInt(v); });
  bindInput('ed-scale-min-label', v => { q.validation = q.validation||{}; q.validation.minLabel=v; });
  bindInput('ed-scale-max-label', v => { q.validation = q.validation||{}; q.validation.maxLabel=v; });
  bindInput('ed-placeholder',     v => { q.validation = q.validation||{}; q.validation.placeholder=v; });
  bindInput('ed-maxlen',          v => { q.validation = q.validation||{}; q.validation.maxLength=parseInt(v)||null; });
  bindInput('ed-rating-max',      v => { q.validation = q.validation||{}; q.validation.max=parseInt(v); });

  // 이모지 모드 토글
  const emojiToggle = document.getElementById('ed-emoji-mode');
  if (emojiToggle) {
    emojiToggle.addEventListener('click', () => {
      q.validation = q.validation||{};
      q.validation.emoji = !q.validation.emoji;
      emojiToggle.classList.toggle('on', q.validation.emoji);
      emojiToggle.setAttribute('aria-checked', q.validation.emoji);
    });
  }

  // 날짜 시간 포함 토글
  const timeToggle = document.getElementById('ed-include-time');
  if (timeToggle) {
    timeToggle.addEventListener('click', () => {
      q.validation = q.validation||{};
      q.validation.includeTime = !q.validation.includeTime;
      timeToggle.classList.toggle('on', q.validation.includeTime);
      timeToggle.setAttribute('aria-checked', q.validation.includeTime);
    });
  }

  // 저장 버튼
  document.getElementById('ed-save')?.addEventListener('click', () => {
    collectEditorValues(q, def);
    renderList();
    scheduleSave();
    showToast('success', '저장됨', '');
  });
}

function collectEditorValues(q, def) {
  const titleEl = document.getElementById('ed-title');
  if (titleEl) q.title = titleEl.value;

  if (def.hasOptions) {
    const rows = document.querySelectorAll('#ed-options .option-row input');
    q.options = [...rows].map(r => r.value.trim()).filter(Boolean);
  }
  if (def.hasGrid) {
    const rows = document.querySelectorAll('#ed-rows .option-row input');
    const cols = document.querySelectorAll('#ed-cols .option-row input');
    q.grid.rows = [...rows].map(r => r.value.trim()).filter(Boolean);
    q.grid.cols = [...cols].map(c => c.value.trim()).filter(Boolean);
  }
}

/* ── 저장 ─────────────────────────────────────────────────────────── */
function scheduleSave() {
  const el = document.getElementById('save-status');
  el.textContent = '저장 중...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 1500);
}

async function doSave() {
  // 현재 편집 중인 값 수집
  if (selectedIdx >= 0) {
    const q = questions[selectedIdx];
    const def = TYPE_DEFS.find(d => d.type === q.type) || {};
    collectEditorValues(q, def);
  }

  const title = document.getElementById('survey-title-input').value.trim();
  const el = document.getElementById('save-status');

  try {
    await API.bulkSaveQuestions(surveyId, questions);
    if (title) await API.updateSurvey(surveyId, { title });
    el.textContent = `저장됨 ${new Date().toLocaleTimeString('ko')}`;
  } catch {
    el.textContent = '저장됨 (데모)';
  }
}

/* ── 게시 ─────────────────────────────────────────────────────────── */
document.getElementById('btn-publish').addEventListener('click', async () => {
  if (questions.length === 0) { showToast('warning', '문항이 없습니다', '최소 1개 이상 문항을 추가해 주세요.'); return; }
  await doSave();
  try {
    await API.setSurveyStatus(surveyId, 'open');
    showToast('success', '설문이 게시되었습니다!', '응답자가 참여할 수 있습니다.');
    setTimeout(() => { location.href = 'dashboard.html'; }, 1200);
  } catch {
    showToast('info', '게시됨 (데모)', '대시보드로 이동합니다.');
    setTimeout(() => { location.href = 'dashboard.html'; }, 1200);
  }
});

/* ── 미리보기 ─────────────────────────────────────────────────────── */
document.getElementById('btn-preview').addEventListener('click', () => {
  window.open(`../respond.html?surveyId=${surveyId}`, '_blank');
});

/* ── 복수응답 토글 ────────────────────────────────────────────────── */
const multToggle = document.getElementById('toggle-multiple');
let allowMultiple = true;
multToggle.addEventListener('click', () => {
  allowMultiple = !allowMultiple;
  multToggle.classList.toggle('on', allowMultiple);
  multToggle.setAttribute('aria-checked', allowMultiple);
});
multToggle.classList.add('on');

/* ── 제목 자동 저장 ───────────────────────────────────────────────── */
document.getElementById('survey-title-input').addEventListener('input', scheduleSave);

/* ── 기존 문항 로드 ───────────────────────────────────────────────── */
async function loadExistingQuestions() {
  try {
    const res = await API.getSurvey(surveyId);
    if (res.survey?.title) document.getElementById('survey-title-input').value = res.survey.title;
    questions = res.questions || [];
    if (questions.length > 0) {
      renderList();
      document.getElementById('center-empty').style.display = 'none';
    }
  } catch {
    // 신규 설문 or 데모
  }
}

/* ── 초기화 ───────────────────────────────────────────────────────── */
buildPalette();
loadExistingQuestions();
</script>
</body>
</html>
